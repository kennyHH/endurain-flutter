name: Flutter Debug APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Needed to create/update releases and move tags
permissions:
  contents: write

jobs:
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localization files
        run: flutter gen-l10n

      - name: Build debug APK
        run: flutter build apk --debug

      # Keep artifact available in the Actions tab as well
      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

      # Move the 'latest' tag to the current commit so the
      # release action can attach the APK to it
      - name: Update 'latest' tag
        if: github.event_name != 'pull_request'
        run: |
          git tag -f latest
          git push -f origin latest

      # Create or update the rolling "Latest Debug Build" release
      - name: Publish to GitHub Releases
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Debug Build
          body: |
            Automated debug build from commit ${{ github.sha }}.
            Built on ${{ github.run_started_at }}.
          prerelease: true
          files: build/app/outputs/flutter-apk/app-debug.apk